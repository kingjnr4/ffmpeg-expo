name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-main
  cancel-in-progress: false

env:
  NODE_VERSION: '24'
  SKIP_FFMPEG_DOWNLOAD: '1'

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Validate npm package contents
        run: npm run pack:check

  version-packages:
    name: Version Packages PR
    runs-on: ubuntu-latest
    needs: validate
    if: github.repository == 'kingjnr4/ffmpeg-expo'
    permissions:
      contents: write
      pull-requests: write
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Create or update Version Packages PR
        id: changesets
        uses: changesets/action@e0145edc7d9d8679003495b11f87bd8ef63c0cba
        with:
          title: Version Packages
          commit: Version Packages
          version: npm run version-packages
        env:
          GITHUB_TOKEN: ${{ github.token }}

  publish-npm:
    name: Publish npm and GitHub releases
    runs-on: ubuntu-latest
    needs: [validate, version-packages]
    if: github.repository == 'kingjnr4/ffmpeg-expo' && needs.version-packages.outputs.hasChangesets == 'false'
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Validate npm package contents
        run: npm run pack:check

      - name: Publish ffmpeg-expo to npm
        uses: changesets/action@e0145edc7d9d8679003495b11f87bd8ef63c0cba
        with:
          publish: npm run publish-packages
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NPM_CONFIG_PROVENANCE: 'true'
