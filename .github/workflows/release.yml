name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-main
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  SKIP_FFMPEG_DOWNLOAD: '1'

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Validate npm package contents
        run: npm run pack:check

  version-packages:
    name: Version Packages PR
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write
      pull-requests: write
    outputs:
      pending: ${{ steps.pending.outputs.pending }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Check pending Changesets
        id: pending
        run: node scripts/pending-changesets.js

      - name: Setup Node.js
        if: steps.pending.outputs.pending == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        if: steps.pending.outputs.pending == 'true'
        run: npm ci

      - name: Version packages
        if: steps.pending.outputs.pending == 'true'
        run: npm run version-packages
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Refresh lockfile
        if: steps.pending.outputs.pending == 'true'
        run: npm install --package-lock-only --ignore-scripts

      - name: Create or update Version Packages PR
        if: steps.pending.outputs.pending == 'true'
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676
        with:
          token: ${{ github.token }}
          branch: changesets/version-packages
          title: Version Packages
          commit-message: Version Packages
          body: |
            This PR was generated by Changesets.

            Merging it publishes the prepared package versions from `main` after validation succeeds.
          labels: release
          delete-branch: true

  publish-npm:
    name: Publish npm
    runs-on: ubuntu-latest
    needs: [validate, version-packages]
    if: needs.version-packages.outputs.pending == 'false'
    permissions:
      contents: read
      id-token: write
    outputs:
      version: ${{ steps.state-after.outputs.version }}
      tag: ${{ steps.state-after.outputs.tag }}
      should_create_release: ${{ steps.state-after.outputs.should_create_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Check npm and release state
        id: state-before
        run: node scripts/npm-release-state.js
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install dependencies
        if: steps.state-before.outputs.should_publish == 'true'
        run: npm ci

      - name: Build packages
        if: steps.state-before.outputs.should_publish == 'true'
        run: npm run build

      - name: Typecheck
        if: steps.state-before.outputs.should_publish == 'true'
        run: npm run typecheck

      - name: Validate npm package contents
        if: steps.state-before.outputs.should_publish == 'true'
        run: npm run pack:check

      - name: Publish ffmpeg-expo to npm
        if: steps.state-before.outputs.should_publish == 'true'
        working-directory: packages/expo-ffmpeg
        run: npm publish --provenance --access public

      - name: Re-check npm and release state
        id: state-after
        run: node scripts/npm-release-state.js
        env:
          GH_TOKEN: ${{ github.token }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-npm
    if: needs.publish-npm.outputs.should_create_release == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Create package GitHub Release
        run: node scripts/create-package-release.js
        env:
          GH_TOKEN: ${{ github.token }}
